<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — WS Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0f11;
            --surface: #17191d;
            --border: #2a2d35;
            --accent: #25d366;
            --accent-dim: #1a9e49;
            --text: #e8eaf0;
            --muted: #6b7280;
            --error: #f87171;
            --radius: 12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.18;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 420px; height: 420px;
            background: var(--accent);
            top: -100px; left: -100px;
        }
        body::after {
            width: 360px; height: 360px;
            background: #3b82f6;
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(30px, 20px); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo-sub { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

        h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.5px; text-transform: uppercase; }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,211,102,0.12);
        }
        input::placeholder { color: var(--muted); }

        .btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #0e0f11;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.2px;
        }
        .btn:hover { background: var(--accent-dim); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 14px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #0e0f11;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">💬</div>
        <div>
            <div class="logo-text">WS Chat</div>
            <div class="logo-sub">websocket tester</div>
        </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to test your WebSocket messages</p>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
</div>

<script>
    // Press Enter to submit
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('errorMsg');

        errEl.style.display = 'none';

        if (!email || !password) {
            showError('Please fill in both fields.');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
            const res = await fetch('/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.message || `Error ${res.status}`);
            }

            const data = await res.json(); // { accessToken, expires }
            localStorage.setItem('accessToken', data.accessToken);
            localStorage.setItem('tokenExpires', data.expires);
            localStorage.setItem('userEmail', email);

            window.location.href = '/chat.html';
        } catch (err) {
            showError(err.message || 'Login failed. Check your credentials.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
